keys:
  # - demo_image
  #  - demo_video
  - 2025-10-23--14-41-24
  # - demo_genvideo

  # 
# global settings, can be overridden by local settings
global:
  preprocess: # stage
    fps: 25
    quality: 1
    resize: 0.5
    interval: 2
    gpu: "2" 
    r3d_refinement: True
    startend_offset: 5
    
  reconstruction:
    gpu: "2"
    bg_completion_mode: "hybrid"
    fdpose_tracking_mode: "spatrack"

  simulation:
    gpu: "0"

# local settings for each key
local:
  # key name
  demo_video:
    preprocess: # stage
      resize: 0.5
    simulation:
      physics: "default"

  demo_genvideo:
    preprocess: # stage
      resize: 1.0
      # override with GT camera info
      fx: 611.23
      fy: 610.758
      cx: 429.539
      cy: 241.204
      depth_scale: 0.0010000000474974513
      depth_max: 1.6 # this is to clip the real depth for removing outliers